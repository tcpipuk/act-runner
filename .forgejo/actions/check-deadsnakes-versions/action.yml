name: Check Deadsnakes Versions
description:
  Find Python versions available across specified Ubuntu releases in the deadsnakes PPA
author: Tom Foster

inputs:
  ubuntu-codenames:
    description: Space-separated list of Ubuntu codenames (e.g. "jammy noble resolute")
    required: true
  limit:
    description: Maximum number of Python versions to return (newest versions are selected)
    required: false
    default: "3"

outputs:
  python-versions:
    description:
      Space-separated list of Python versions available across all specified Ubuntu releases
    value: ${{ steps.check.outputs.versions }}

runs:
  using: composite
  steps:
    - name: Check Python versions
      id: check
      shell: python
      run: |
        import json
        import os
        import re
        import sys
        import urllib.parse
        import urllib.request

        PPA_URL = "https://api.launchpad.net/devel/~deadsnakes/+archive/ubuntu/ppa"
        SERIES_URL_TEMPLATE = "https://api.launchpad.net/devel/ubuntu/{codename}"
        PYTHON_NAME_RE = re.compile(r"^python(\d+\.\d+)$")

        def fetch_published_pythons(codename):
            """Return the set of Python minor versions deadsnakes publishes for this series.

            Queries Launchpad's getPublishedSources for source packages whose name starts
            with 'python3.', then keeps only those matching 'pythonX.Y' exactly. This
            survives future description-format changes because it reads the published
            package list directly rather than parsing free-text.
            """
            params = {
                "ws.op": "getPublishedSources",
                "distro_series": SERIES_URL_TEMPLATE.format(codename=codename),
                "status": "Published",
                "source_name": "python3.",
                "exact_match": "false",
            }
            url = f"{PPA_URL}?{urllib.parse.urlencode(params)}"

            versions = set()
            while url:
                with urllib.request.urlopen(url) as response:
                    data = json.loads(response.read().decode())
                for entry in data.get("entries", []):
                    match = PYTHON_NAME_RE.match(entry.get("source_package_name", ""))
                    if match:
                        versions.add(match.group(1))
                url = data.get("next_collection_link")
            return versions

        codenames_input = "${{ inputs.ubuntu-codenames }}"
        codenames = codenames_input.strip().split()
        limit = int("${{ inputs.limit }}")

        print(f"::debug::Checking Python versions for Ubuntu codenames: {codenames}")
        if limit > 0:
            print(f"::debug::Limiting to {limit} newest versions")

        try:
            versions_by_codename = {}
            for codename in codenames:
                versions = fetch_published_pythons(codename)
                if versions:
                    versions_by_codename[codename] = versions
                    print(f"::debug::{codename}: {sorted(versions)}")
                else:
                    print(f"::warning::No Python versions found for Ubuntu {codename} in deadsnakes")

            if versions_by_codename:
                common = set.intersection(*versions_by_codename.values())
                common_sorted = sorted(common, key=lambda v: tuple(map(int, v.split("."))))
                if limit > 0 and len(common_sorted) > limit:
                    common_sorted = common_sorted[-limit:]
                versions_output = " ".join(common_sorted)
            else:
                versions_output = ""

            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                f.write(f"versions={versions_output}\n")

            if versions_output:
                print(f"::notice::Common Python versions: {versions_output}")
            else:
                print(f"::warning::No common Python versions found across {codenames}")

        except Exception as e:
            print(f"::error::Failed to check deadsnakes versions: {e}")
            sys.exit(1)
